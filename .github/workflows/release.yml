name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release
          tar -czf fasthttp-gui_${{ github.ref_name }}_${{ matrix.target }}.tar.gz fasthttp-gui
          echo "ASSET=src-tauri/target/${{ matrix.target }}/release/fasthttp-gui_${{ github.ref_name }}_${{ matrix.target }}.tar.gz" >> $GITHUB_ENV

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release
          tar -czf fasthttp-gui_${{ github.ref_name }}_${{ matrix.target }}.tar.gz fasthttp-gui
          echo "ASSET=src-tauri/target/${{ matrix.target }}/release/fasthttp-gui_${{ github.ref_name }}_${{ matrix.target }}.tar.gz" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
