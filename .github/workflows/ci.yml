name: CI / Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from gui-version
        id: read
        run: |
          VERSION=$(cat gui-version | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag v${{ steps.read.outputs.version }} already exists
        id: check
        run: |
          VERSION=$(cat gui-version | tr -d '[:space:]')
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists — skipping build"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v${VERSION} not found — will build and release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          find src-tauri/target/${{ matrix.target }}/release/bundle \
            -maxdepth 2 \
            \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \
               -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \) \
            -exec cp {} dist/ \;
          echo "Collected files:"
          ls dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fasthttp-gui-${{ matrix.target }}
          path: dist/
          if-no-files-found: ignore

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
